name: Daily Portfolio Simulation

on:
  schedule:
    - cron: '0 21 * * 1-5' # 21:00 UTC, Mon-Fri (Market Close)
  workflow_dispatch: # Allow manual triggers

jobs:
  simulate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Intelligence Hub & Agent Roster
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # Alias if needed
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Use the main entry point (adjusting for v2 structure)
          python -m v2.main --run-date "2026-04-07"

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Daily Simulation: ${{ github.event.schedule || 'Manual Run' }} [2026-04-07]"
          file_pattern: 'v2/data/snapshots/*.json v2/data/portfolios/*.json v2/data/logs/*.log'
          branch: main
